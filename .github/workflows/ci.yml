name: CI

on:
  pull_request:
    types: [closed]

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: Debug context
        run: |
          echo "action: ${{ github.event.action }}"
          echo "merged: ${{ github.event.pull_request.merged }}"
          echo "base_ref: ${{ github.base_ref }}"
          echo "main branch var: ${{ vars.P4_MAIN_BRANCH_NAME }}"
          echo "dev branch var: ${{ vars.P4_DEV_BRANCH_NAME }}"

  sync:
    if: |
      github.event.name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      (github.event.pull_request.base_ref == vars.P4_MAIN_BRANCH_NAME ||
      github.event.pull_request.base_ref == vars.P4_DEV_BRANCH_NAME)

    runs-on: ubuntu-latest

    env:
      P4_STREAM_DEPOT: ${{ vars.P4_STREAM_DEPOT }}  # Name of the stream depot to sync to.
      P4_MAIN_BRANCH_NAME: ${{ vars.P4_MAIN_BRANCH_NAME }}  # Name of the main branch.
      P4_DEV_BRANCH_NAME: ${{ vars.P4_DEV_BRANCH_NAME }}  # Name of the dev branch.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Complete history

      - name: Install git-p4 & P4 CLI
        run: |
          sudo apt-get install git -y
          curl -fsSL https://filehost.perforce.com/perforce/r25.2/bin.linux26x86_64/p4 \
            -o /usr/local/p4
          chmod +x /usr/local/bin/p4

      - name: Configure P4 credentials
        env:
          P4PORT:   ${{ secrets.P4PORT }}
          P4USER:   ${{ secrets.P4USER }}
          P4PASSWD: ${{ secrets.P4PASSWD }}
          P4CLIENT: ${{ secrets.P4CLIENT }}
        run: |
          p4 trust -y
          p4 login -p <<< "$P4PASSWD"

      - name: Determine target P4 path
        id: p4path
        run: |
          BRANCH="${{ github.base_ref }}"
          if [ "$BRANCH" = "${{ env.P4_MAIN_BRANCH_NAME }}" ]; then
            echo "path=//${{ env.P4_STREAM_DEPOT }}/${{ env.P4_MAIN_BRANCH_NAME }}" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "${{ env.P4_DEV_BRANCH_NAME }}" ]; then
            echo "path=//${{ env.P4_STREAM_DEPOT }}/${{ env.P4_DEV_BRANCH_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync Git to Perforce
        env:
          P4PORT:   ${{ secrets.P4PORT }}
          P4USER:   ${{ secrets.P4USER }}
          P4CLIENT: ${{ secrets.P4CLIENT }}
          GIT_P4_DEPOT_PATH: ${{ steps.p4path.outputs.path }}/...
          GIT_P4_ORIGIN: origin/${{ github.base_ref }}
        run: |
          git config git-p4.skipSubmitEdit true
          git config git-p4.depotPath "$GIT_P4_DEPOT_PATH"
          git p4 submit --origin "$GIT_P4_ORIGIN"
