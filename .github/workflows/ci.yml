name: CI

on:
  pull_request:
    types: [closed]

jobs:
  sync:
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      (github.base_ref == 'main' || github.base_ref == 'dev')

    runs-on: ubuntu-latest

    steps:
      - name: Set config variables
        id: config
        run: |
          echo "main_branch=main" >> $GITHUB_OUTPUT
          echo "dev_branch=dev" >> $GITHUB_OUTPUT
          echo "p4_stream_depot=${{ vars.P4_STREAM_DEPOT }}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Complete history

      - name: Install git-p4 & P4 CLI
        run: |
          sudo apt-get install git -y
          curl -fsSL https://filehost.perforce.com/perforce/r25.2/bin.linux26x86_64/p4 \
            -o /usr/local/bin/p4
          chmod +x /usr/local/bin/p4

      - name: Configure P4 credentials
        env:
          P4PORT:   ${{ secrets.P4PORT }}
          P4USER:   ${{ secrets.P4USER }}
          P4PASSWD: ${{ secrets.P4PASSWD }}
          P4CLIENT: ${{ secrets.P4CLIENT }}
        run: |
          p4 trust -y
          p4 login -p <<< "$P4PASSWD"

      - name: Determine target P4 path
        id: p4path
        run: |
          BRANCH="${{ github.base_ref }}"
          if [ "$BRANCH" = "${{ steps.config.outputs.main_branch }}" ]; then
            echo "path=//${{ steps.config.outputs.p4_stream_depot }}/${{ steps.config.outputs.main_branch }}" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "${{ steps.config.outputs.dev_branch }}" ]; then
            echo "path=//${{ steps.config.outputs.p4_stream_depot }}/${{ steps.config.outputs.dev_branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync Git to Perforce
        env:
          P4PORT:   ${{ secrets.P4PORT }}
          P4USER:   ${{ secrets.P4USER }}
          P4CLIENT: ${{ secrets.P4CLIENT }}
          GIT_P4_DEPOT_PATH: ${{ steps.p4path.outputs.path }}/...
          GIT_P4_ORIGIN: origin/${{ github.base_ref }}
        run: |
          git config git-p4.skipSubmitEdit true
          git config git-p4.depotPath "$GIT_P4_DEPOT_PATH"
          git p4 submit --origin "$GIT_P4_ORIGIN"
